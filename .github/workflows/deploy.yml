name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Amplify (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Trigger or wait for Amplify deployment
        run: |
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          BRANCH=main

          # Check if a job is already running (auto-triggered by Amplify on push)
          RUNNING_JOB=$(aws amplify list-jobs \
            --app-id $APP_ID \
            --branch-name $BRANCH \
            --max-results 1 \
            --query 'jobSummaries[?status==`RUNNING` || status==`PENDING`].jobId' \
            --output text)

          if [ -n "$RUNNING_JOB" ]; then
            echo "Amplify already has a running job: $RUNNING_JOB — waiting for it to complete..."
            JOB_ID=$RUNNING_JOB
          else
            echo "No running job found — starting a new Amplify deployment..."
            JOB_ID=$(aws amplify start-job \
              --app-id $APP_ID \
              --branch-name $BRANCH \
              --job-type RELEASE \
              --query 'jobSummary.jobId' \
              --output text)
            echo "Started Amplify job: $JOB_ID"
          fi

          echo "Waiting for job $JOB_ID to complete..."
          while true; do
            STATUS=$(aws amplify get-job \
              --app-id $APP_ID \
              --branch-name $BRANCH \
              --job-id $JOB_ID \
              --query 'job.summary.status' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Deployment succeeded."
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
